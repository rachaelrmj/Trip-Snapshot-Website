<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <meta name="description" content="Trip Snapshot is a smart travel planner that instantly generates personalized itineraries, trip highlights, and visual snapshots of your travel plans.">
    <meta name="keywords" content="travel planner, itinerary generator, trip planner, travel itinerary, vacation planner, travel planning tool, trip snapshot">
    <meta name="author" content="Rachael Martinez-Jones">
    
    <meta property="og:title" content="Trip Snapshot | Visual Travel Planner & Itinerary Generator">
    <meta property="og:description" content="Plan smarter trips with Trip Snapshot. Generate personalized travel itineraries, organize destinations, and create visual trip snapshots in seconds.">
    <meta property="og:image" content="https://tripsnapshot.com/trip-snapshot.jpg">
    <meta property="og:url" content="https://tripsnapshot.com">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Trip Snapshot">
    <meta property="og:locale" content="en_US">

    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Trip Snapshot | Visual Travel Planner">
    <meta name="twitter:description" content="Generate personalized travel itineraries and visual trip plans instantly with Trip Snapshot.">
    <meta name="twitter:image" content="https://tripsnapshot.com/trip-snapshot.jpg">
    <meta name="twitter:url" content="https://tripsnapshot.com">
    <meta name="twitter:creator" content="Rachael Martinez-Jones">

    <title>Trip Snapshot | Travel Planner & Itinerary Generator</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Montserrat:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">

    <link rel="canonical" href="https://tripsnapshot.com">
    <link rel="stylesheet" href="css/planner-styles.css"> 

    <script src="js/storage.js" defer></script> 
    <script src="js/itinerary.js" defer></script>
    <script src="js/snapshot.js" defer></script>
</head>

<body>
    <header>
        <h1>Trip Snapshot</h1>

        <a href="index.html" class="logo-link">
            <img src="images/Trip-Snapshot-Logo.png" class="logo" alt="Trip Snapshot Logo">
        </a>

        <div class="hamburger-menu">
            <input type="checkbox" id="menu-toggle">
            <label for="menu-toggle" class="menu-icon">
                <img src="images/hamburger-menu.svg" alt="Open navigation menu">
            </label>

            <nav class="mobile-nav" aria-label="Mobile navigation">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="planner.html">Plan</a></li>
                    <li><a href="explore.html">Explore</a></li>
                    <li><a href="about.html">About</a></li>
                </ul>
            </nav>
        </div>

        <form id="search-bar" action="explore.html" method="GET">
            <label for="destination-search" class="sr-only">Search for a destination</label>
            <input type="text" id="destination-search" name="destination-search" placeholder="Search for a destination">
            <button type="submit" id="search-button">Search</button>
        </form>

        <a href="profile.html" class="profile-link">
            <img src="images/profile-logo.svg" class="profile" alt="User Profile Icon">
        </a>
    </header>

    <main>
        <section id="plan-trip">
            <div id="hero-plan_container">
                <img src="images/planner-page/plan-trip.png" id="img-plan_trip" alt="Banner image with a clock and calendar representing trip planning">
                <div id="hero-text">
                    <h2>Plan Your Trip</h2>
                    <p>Leave the planning to us. Just pack and go!</p>
                </div>
            </div>

            <div class="planner-form-wrapper">
                <form class="trip-search-form">
                    <div class="form-group">
                        <label for="destination">Destination</label>
                        <input type="text" id="destination" name="destination" placeholder="Enter a city or country" required>
                    </div>

                    <div class="plan-dates">
                        <div class="form-group" id="plan-start">
                            <label for="start-date">Start Date</label>
                            <input type="date" id="start-date" name="start-date" required>
                        </div>

                        <div class="form-group" id="plan-end">
                            <label for="end-date">End Date</label>
                            <input type="date" id="end-date" name="end-date" required>
                        </div>
                    </div>

                    <div class="form-group plan-budget">
                        <label for="budget">Budget</label>
                        <select id="budget" name="budget" required>
                            <option value="">Select budget range</option>
                            <option value="budget-friendly">Budget-Friendly</option>
                            <option value="moderate">Moderate</option>
                            <option value="luxury">Luxury</option>
                        </select>
                    </div>

                    <div class="form-group plan-people">
                        <label for="travelers">Travelers</label>
                        <select id="travelers" name="travelers" required>
                            <option value="">Select number</option>
                            <option value="1">1 Traveler</option>
                            <option value="2">2 Travelers</option>
                            <option value="3">3 Travelers</option>
                            <option value="4+">4+ Travelers</option>
                        </select>
                    </div>
        
                    <div class="form-group plan-style">
                        <label for="trip-style">Trip Style</label>
                        <select id="trip-style" name="trip-style" required>
                            <option value="">Select trip style</option>
                            <option value="relaxing">Relaxing</option>
                            <option value="adventure">Adventure</option>
                            <option value="foodie">Foodie</option>
                            <option value="family">Family</option>
                            <option value="romantic">Romantic</option>
                            <option value="cultural">Cultural</option>
                        </select>
                    </div>

                    <button type="submit" class="generate-btn">Generate Trip Plan</button>
                </form>
            </div>
        </section>
    </main> 

    <footer>
        <p>&copy; 2024 Trip Snapshot. All rights reserved.</p>
    </footer>
</body>
</html>
